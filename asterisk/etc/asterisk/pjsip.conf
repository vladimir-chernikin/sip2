; pjsip.conf – конфигурация для 1001 + Билайн по инструкции ТП

[global]
type=global
endpoint_identifier_order=username,ip,anonymous

; ===== ТРАНСПОРТ UDP =====
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
;external_media_address=109.172.46.197  ; 🔧 DISABLED - ломает externalMedia RTP к AudioSocket
external_signaling_address=109.172.46.197
local_net=172.18.0.0/16   ; 🔧 Docker сеть
local_net=172.16.0.0/12
local_net=10.0.0.0/8
local_net=192.168.0.0/16

; ===== AOR 1001 =====
[1001]
type=aor
max_contacts=1
remove_existing=yes
remove_unavailable=yes
default_expiration=60
qualify_frequency=30
qualify_timeout=3.0

; ===== AUTH 1001 =====
[1001]
type=auth
auth_type=userpass
username=1001
password=1001pass

; ===== ENDPOINT 1001 =====
[1001]
type=endpoint
context=from-internal
disallow=all
allow=alaw
allow=ulaw
allow=slin16
transport=transport-udp
auth=1001
aors=1001
direct_media=no
dtmf_mode=rfc4733
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
rtp_keepalive=5

; ===== БИЛАЙН SIP ТРАНК (по инструкции ТП) =====

; AOR для Билайн - по инструкции Билайн
[beeline]
type=aor
contact=sip:ip.beeline.ru
max_contacts=1
qualify_frequency=30
qualify_timeout=5.0

; AUTH для Билайн
[beeline]
type=auth
auth_type=userpass
username=SIP030FQU0451O@ip.beeline.ru
password=ZAQ12wsx-

; REGISTER для Билайн
[beeline-reg]
type=registration
retry_interval=20
max_retries=10
contact_user=SIP030FQU0451O
expiration=120
transport=transport-udp
outbound_auth=beeline
client_uri=sip:SIP030FQU0451O@ip.beeline.ru
server_uri=sip:ip.beeline.ru:5060  ; 🔧 ip.beeline.ru для регистрации

; IDENTIFY для входящих от Билайн по IP - добавлен spb.ip.beeline.ru
[beeline-identify]
type=identify
endpoint=beeline
match=spb.ip.beeline.ru
match=ip.beeline.ru
match=185.243.5.36
match=51.91.168.102
match=84.201.137.0
match=185.150.191.123
match=172.110.223.6

; ENDPOINT для Билайн
[beeline]
type=endpoint
context=from-beeline
disallow=all
allow=alaw
allow=ulaw
transport=transport-udp
aors=beeline
direct_media=no
dtmf_mode=rfc4733   ; 🔧 По инструкции Билайн
rewrite_contact=yes
rtp_symmetric=yes   ; 🔧 Включено
force_rport=yes
rtp_keepalive=5
outbound_auth=beeline                 ; 🔧 Аутентификация для исходящих
from_user=SIP030FQU0451O                ; 🔧 Логин для аутентификации (обязательно!)
from_domain=ip.beeline.ru
callerid="+79038585556" <+79038585556>   ; 🔧 Номер для исходящих CallerID
send_rpid=yes                           ; 🔧 Отправлять Remote-Party-ID с CallerID
trust_id_outbound=yes                   ; 🔧 Доверять исходящему CallerID
;media_address=109.172.46.197  ; DISABLED - breaks AudioSocket
trust_id_inbound=yes
inband_progress=yes
language=ru
